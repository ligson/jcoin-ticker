# --------------------------------------------------------
# 优化后的 Electron 多平台构建与发布工作流
# --------------------------------------------------------
name: BuildAndPackage

on:
  push:
    tags:
      - '*'
    #branches:
    #  - main

env:
  ACTIONS_RUNNER_DEBUG: true
  ACTIONS_STEP_DEBUG: true
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
  ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

permissions:
  contents: write # 授予写入权限用于创建 Release 和上传 Assets

jobs:
  # 构建作业 - 多系统并行构建
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ macos-latest, ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4 # 推荐使用 v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4 # 推荐使用 v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Validate tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json 版本 ($PACKAGE_VERSION) 与当前 tag ($GITHUB_REF_NAME) 不一致。"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch electron-builder cache mode import
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = require('path')
          const file = require.resolve('app-builder-lib/out/binDownload.js')
          const rootTypesFile = require.resolve('@electron/get/dist/cjs/types.js')
          let relativeTypesPath = path.relative(path.dirname(file), rootTypesFile).replace(/\\/g, '/')
          if (!relativeTypesPath.startsWith('.')) {
            relativeTypesPath = `./${relativeTypesPath}`
          }
          relativeTypesPath = relativeTypesPath.replace(/\.js$/, '')
          let text = fs.readFileSync(file, 'utf8')
          if (!text.includes('const get_1 = require("@electron/get");')) {
            throw new Error('未找到需要修补的 electron-builder 导入语句')
          }
          if (!text.includes('function getBinariesMirrorUrl(githubOrgRepo) {')) {
            throw new Error('未找到需要修补的 electron-builder 镜像函数')
          }
          text = text.replace(
            'const get_1 = require("@electron/get");',
            `const get_1 = require("${relativeTypesPath}");`
          )
          text = text.replace(
            /function getBinariesMirrorUrl\(githubOrgRepo\) \{[\s\S]*?\n\}/,
            `function getBinariesMirrorUrl(githubOrgRepo) {
    return \`https://github.com/\${githubOrgRepo}/releases/download/\`;
}`
          )
          fs.writeFileSync(file, text, 'utf8')
          console.log(`已修补 electron-builder：${file}`)
          console.log(`已强制缓存模式导入路径：${relativeTypesPath}`)
          NODE

      - name: Inspect download mirror config
        shell: bash
        run: |
          export NPM_CONFIG_ELECTRON_MIRROR=""
          export npm_config_electron_mirror=""
          export npm_package_config_electron_mirror=""
          export NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          export npm_config_electron_builder_binaries_mirror="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          export npm_package_config_electron_builder_binaries_mirror="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          echo "pnpm electron_mirror: $(pnpm config get electron_mirror)"
          node -e "console.log(JSON.stringify({ NPM_CONFIG_ELECTRON_MIRROR: process.env.NPM_CONFIG_ELECTRON_MIRROR ?? null, npm_config_electron_mirror: process.env.npm_config_electron_mirror ?? null, npm_package_config_electron_mirror: process.env.npm_package_config_electron_mirror ?? null, NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: process.env.NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR ?? null, npm_config_electron_builder_binaries_mirror: process.env.npm_config_electron_builder_binaries_mirror ?? null, npm_package_config_electron_builder_binaries_mirror: process.env.npm_package_config_electron_builder_binaries_mirror ?? null, ELECTRON_BUILDER_BINARIES_MIRROR: process.env.ELECTRON_BUILDER_BINARIES_MIRROR ?? null }, null, 2))"

      - name: Build Electron app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          export NPM_CONFIG_ELECTRON_MIRROR=""
          export npm_config_electron_mirror=""
          export npm_package_config_electron_mirror=""
          export ELECTRON_MIRROR=""
          export NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          export npm_config_electron_builder_binaries_mirror="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          export npm_package_config_electron_builder_binaries_mirror="https://github.com/electron-userland/electron-builder-binaries/releases/download/"
          export PATH="$PWD/node_modules/.bin:$PATH"
          vue-tsc
          vite build
          node -e "console.log(JSON.stringify({ NPM_CONFIG_ELECTRON_MIRROR: process.env.NPM_CONFIG_ELECTRON_MIRROR ?? null, npm_config_electron_mirror: process.env.npm_config_electron_mirror ?? null, npm_package_config_electron_mirror: process.env.npm_package_config_electron_mirror ?? null, ELECTRON_MIRROR: process.env.ELECTRON_MIRROR ?? null }, null, 2))"
          node node_modules/electron-builder/cli.js --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # 这里的名称是正确的，它定义了下载后的子文件夹名
          name: build-artifacts-${{ matrix.os }}
          path: release/

  # 发布作业 - 依赖构建完成后再执行
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: List downloaded files (Debug)
        run: |
          ls -R downloaded-artifacts/ # 使用 -R 递归显示文件结构

      - name: Extract release notes from CHANGELOG
        id: release_notes
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          awk -v version="$TAG_VERSION" '
            BEGIN {
              target = "## [" version "]"
            }
            index($0, target) == 1 {
              started = 1
            }
            started && /^## \[/ && index($0, target) != 1 {
              exit
            }
            started {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            cat <<'EOF' > release-notes.md
          ## 更新说明

          本次发布未能从 `CHANGELOG.md` 中提取到与当前版本对应的章节，请检查 changelog 与 `package.json` 的版本是否一致。
          EOF
          fi

          {
            echo 'body<<EOF'
            cat release-notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: ${{ steps.release_notes.outputs.body }}
          draft: false
          prerelease: false

      # ----------------------------------------------------
      # ⚠️ 关键修正 1：查找 Windows .exe 文件的精确路径
      # ----------------------------------------------------
      - name: Find Windows Asset Path
        id: find_win_asset
        run: |
          # find 命令查找 .exe 文件，并将其路径存入环境变量
          EXE_PATH=$(find downloaded-artifacts/build-artifacts-windows-latest -name "*.exe" | head -n 1)
          if [ -z "$EXE_PATH" ]; then
            echo "::error::Could not find Windows .exe file in expected path."
            exit 1
          fi
          echo "windows_path=$EXE_PATH" >> $GITHUB_OUTPUT

      - name: Upload Windows assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # 使用上一步找到的精确路径
          asset_path: ${{ steps.find_win_asset.outputs.windows_path }}
          asset_name: jcoin-ticker-windows-installer.exe
          asset_content_type: application/octet-stream

      # ----------------------------------------------------
      # ⚠️ 关键修正 2：查找 macOS .dmg 文件的精确路径
      # ----------------------------------------------------
      - name: Find macOS Asset Path
        id: find_mac_asset
        run: |
          DMG_PATH=$(find downloaded-artifacts/build-artifacts-macos-latest -name "*-Mac-universal-*.dmg" | head -n 1)
          if [ -z "$DMG_PATH" ]; then
            echo "::warning::Could not find macOS .dmg file in expected path. Skipping upload."
            # 不退出，允许流程继续
            exit 0
          fi
          echo "macos_path=$DMG_PATH" >> $GITHUB_OUTPUT

      - name: Upload macOS assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # 使用上一步找到的精确路径
          asset_path: ${{ steps.find_mac_asset.outputs.macos_path }}
          asset_name: jcoin-ticker-macos-universal-installer.dmg
          asset_content_type: application/octet-stream

      # ----------------------------------------------------
      # ⚠️ 关键修正 3：查找 Linux .AppImage 文件的精确路径
      # ----------------------------------------------------
      - name: Find Linux Asset Path
        id: find_linux_asset
        run: |
          APPIMAGE_PATH=$(find downloaded-artifacts/build-artifacts-ubuntu-latest -name "*.AppImage" | head -n 1)
          if [ -z "$APPIMAGE_PATH" ]; then
            echo "::warning::Could not find Linux .AppImage file in expected path. Skipping upload."
            exit 0
          fi
          echo "linux_path=$APPIMAGE_PATH" >> $GITHUB_OUTPUT

      - name: Upload Linux assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # 使用上一步找到的精确路径
          asset_path: ${{ steps.find_linux_asset.outputs.linux_path }}
          asset_name: jcoin-ticker-linux-installer.AppImage
          asset_content_type: application/octet-stream
